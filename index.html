<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="format-detection" content="telephone=no">
    <title>Life Planner</title>
    <link rel="icon" href="/appIcon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <div id="header">
            <div class="hd-row">
                <div class="logo"><span>Life</span>Planner</div>
                <div class="hd-right">
                    <button class="jump-btn" onclick="openJumpDate()">📅 Go to date</button>
                    <div class="hd-date" id="hdDate"></div>
                </div>
            </div>
            <div class="tabs" id="tabs"></div>
            <div id="header-footer" style="display:none"></div>
        </div>
        <div id="content"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
