<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Life Planner">
    <title>Life Planner</title>
    <link rel="icon" href="/appIcon.png" type="image/png">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div id="app">
        <div id="header">
            <div class="hd-row">
                <div class="logo"><span>Life</span>Planner</div>
                <div class="hd-right">
                    <button class="jump-btn" onclick="openJumpDate()">📅 Go to date</button>
                    <div class="hd-date" id="hdDate"></div>
                </div>
            </div>
            <div class="tabs" id="tabs"></div>
            <div id="header-footer" style="display:none"></div>
        </div>
        <div id="content"></div>
    </div>

    <script src="/script.js" defer></script>
</body>

</html>
