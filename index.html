<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- iPhone / mobile viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- iOS web app support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Life Planner" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0e0e10" />

    <title>Life Planner</title>

    <!-- App icon -->
    <link rel="apple-touch-icon" href="appIcon.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="appIcon.png" />
    <link rel="icon" href="appIcon.png" type="image/png" />

    <!-- Manifest (for installable web app) -->
    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div id="app">
      <div id="header">
        <div class="hd-row">
          <div class="logo"><span>Life</span>Planner</div>

          <div class="hd-right">
            <button class="jump-btn" onclick="openJumpDate()">
              📅 Go to date
            </button>
            <div class="hd-date" id="hdDate"></div>
          </div>
        </div>

        <div class="tabs" id="tabs"></div>
        <div id="header-footer" style="display: none"></div>
      </div>

      <div id="content"></div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
